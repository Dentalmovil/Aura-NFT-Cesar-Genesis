<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura NFT - Dentalmovilr4</title>
    <style>
        body { background-color: #0a0a0b; color: #00ffcc; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: #8e44ad; text-transform: uppercase; border-bottom: 2px solid #8e44ad; display: inline-block; padding-bottom: 10px; }
        #connectBtn { margin: 20px 0; padding: 12px 25px; border-radius: 50px; border: 2px solid #00ffcc; background: transparent; color: #00ffcc; font-weight: bold; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .nft-card { background: #161618; border: 1px solid #333; border-radius: 15px; padding: 15px; }
        .nft-card img { width: 100%; height: auto; border-radius: 10px; display: block; }
        .btn { display: block; padding: 10px; background: #8e44ad; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 Aura Agro-Genesis</h1>
        <p>Digital Creator: <b>Dentalmovilr4</b></p>
        <button id="connectBtn">🔌 Conectar Billetera</button>

        <div class="gallery">
            <div class="nft-card">
                <img src="./nfts/1.jpg.jpg" alt="NFT 1">
                <h3>Vínculo Ancestral #001</h3>
                <a href="#" class="btn">Ver en OpenSea</a>
            </div>
            <div class="nft-card">
                <img src="./nfts/2.jpg.jpg" alt="NFT 2">
                <h3>Horizonte Monad #002</h3>
                <a href="#" class="btn">Ver en OpenSea</a>
            </div>
            <div class="nft-card">
                <img src="./nfts/3.jpg.jpg" alt="NFT 3">
                <h3>Nutrición V2 #003</h3>
                <a href="#" class="btn">Ver en OpenSea</a>
            </div>
        </div>
    </div>
    <script>
        const btn = document.getElementById('connectBtn');
        btn.onclick = async () => {
            if (window.ethereum) {
                const acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
                btn.innerText = "Conectado: " + acc[0].substring(0,6) + "...";
            } else { alert("Instala MetaMask"); }
        };
    </script>
</body>
</html>
