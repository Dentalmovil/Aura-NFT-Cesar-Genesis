<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura NFT - Dentalmovilr4</title>
    <style>
        body { background-color: #0a0a0b; color: #00ffcc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: #8e44ad; text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid #8e44ad; display: inline-block; padding-bottom: 10px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .nft-card { background: #161618; border: 1px solid #333; border-radius: 15px; padding: 15px; transition: 0.3s; }
        .nft-card:hover { border-color: #8e44ad; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(142, 68, 173, 0.4); }
        .nft-card img { width: 100%; border-radius: 10px; margin-bottom: 15px; height: auto; }
        .btn { display: block; padding: 10px; background: #8e44ad; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 Aura Agro-Genesis</h1>
        <p>Digital Creator: <b>Dentalmovilr4</b> | Web3 Project</p>

        <div class="gallery">
            <div class="nft-card">
                <img src="nfts/1.jpg.jpg" alt="Vínculo Ancestral">
                <h3>Vínculo Ancestral #001</h3>
                <p>Rareza: Legendaria</p>
                <a href="#" class="btn">Ver en OpenSea</a>
            </div>

            <div class="nft-card">
                <img src="nfts/2.jpg.jpg" alt="Horizonte Monad">
                <h3>Horizonte Monad #002</h3>
                <p>Rareza: Épica</p>
                <a href="#" class="btn">Ver en OpenSea</a>
            </div>

            <div class="nft-card">
                <img src="nfts/3.jpg.jpg" alt="Nutrición V2">
                <h3>Nutrición V2 #003</h3>
                <p>Rareza: Épica</p>
                <a href="#" class="btn">Ver en OpenSea</a>
            </div>

            <div class="nft-card">
                <img src="nfts/nft4.html" alt="Aura Especial">
                <h3>Aura Especial #004</h3>
                <p>Rareza: Mística</p>
                <a href="#" class="btn">Ver en OpenSea</a>
            </div>
        </div>
    </div>
</body>
</html>
